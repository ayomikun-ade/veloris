<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#06080e" />
    <meta name="color-scheme" content="dark light" />
    <meta
      name="description"
      content="Veloris — real-time cybersecurity threat-ops analytics dashboard. Live event stream, ECharts visualizations, filters, alerts."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Veloris — Real-Time Threat Analytics" />
    <meta
      property="og:description"
      content="Real-time cybersecurity threat-ops analytics dashboard. Live event stream, five visualizations, virtualized activity feed, exponential reconnect backoff."
    />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Veloris — Real-time cybersecurity threat-ops analytics" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Veloris — Real-Time Threat Analytics" />
    <meta
      name="twitter:description"
      content="Real-time cybersecurity threat-ops analytics dashboard. Vue 3 + ECharts + Web Worker streaming."
    />
    <meta name="twitter:image" content="/og-image.svg" />

    <title>Veloris — Real-Time Threat Analytics</title>
    <script>
      // Anti-FOUC: respect stored preference before Vue boots. Default is dark.
      (function () {
        try {
          var stored = localStorage.getItem('veloris-theme')
          if (stored === 'light') document.documentElement.classList.remove('dark')
        } catch (e) {
          /* localStorage unavailable — stay on default */
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
